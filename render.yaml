# Render 部署配置
services:
  - type: web
    name: os-file-system-agent
    env: docker
    region: singapore
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    disk:
      name: knowledge-data
      mountPath: /app/knowledge_base
      sizeGB: 1
